<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>نظام الاستعلام عن تعويض الأركاب</title>

    <!-- خط Tajawal -->
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    >

    <style>

        /* =====================================================
           الألوان الرئيسية
        ===================================================== */

        :root {

            --primary-color: #0b3c26;

            --primary-dark: #062719;

            --gold: #c5a059;

            --gold-light: #e2c98f;

            --bg-color: #f4f7f6;

            --card-bg: #ffffff;

            --text-color: #2c3e50;

            --border-color: #e1e5e3;

        }


        /* =====================================================
           إعدادات عامة
        ===================================================== */

        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            font-family: 'Tajawal', sans-serif;

        }


        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            min-height: 100vh;

            padding: 25px;

        }


        .container {

            width: 100%;

            max-width: 850px;

            margin: auto;

        }


        /* =====================================================
           الهيدر العلوي
        ===================================================== */

        .main-header {

            background: linear-gradient(
                135deg,
                var(--primary-color) 0%,
                var(--primary-dark) 100%
            );

            color: white;

            padding: 25px 30px;

            border-radius: 16px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.12);

            display: flex;

            align-items: center;

            justify-content: space-between;

            margin-bottom: 25px;

            border-bottom: 4px solid var(--gold);

        }


        .header-title h1 {

            font-size: 23px;

            font-weight: 800;

            margin-bottom: 7px;

        }


        .header-title p {

            font-size: 14px;

            color: #d5e5dc;

        }


        .logo-container img {

            height: 80px;

            width: auto;

            object-fit: contain;

            filter: drop-shadow(
                0 2px 4px rgba(0,0,0,0.3)
            );

        }


        /* =====================================================
           بطاقة الاستعلام
        ===================================================== */

        .card {

            background: var(--card-bg);

            border-radius: 16px;

            padding: 30px;

            box-shadow:
                0 5px 20px rgba(0,0,0,0.05);

            border: 1px solid var(--border-color);

            margin-bottom: 25px;

        }


        .card-title {

            color: var(--primary-color);

            font-size: 19px;

            font-weight: 800;

            display: flex;

            align-items: center;

            gap: 10px;

            padding-bottom: 15px;

            margin-bottom: 25px;

            border-bottom: 2px solid #f0f0f0;

        }


        /* =====================================================
           الحقول
        ===================================================== */

        .form-group {

            display: flex;

            flex-direction: column;

            gap: 9px;

        }


        .form-group label {

            font-size: 14px;

            font-weight: 700;

            color: #444;

        }


        .form-group select {

            width: 100%;

            padding: 14px 15px;

            border: 1.5px solid var(--border-color);

            border-radius: 9px;

            font-size: 15px;

            outline: none;

            background: #fafafa;

            transition: 0.3s;

            cursor: pointer;

        }


        .form-group select:focus {

            border-color: var(--gold);

            background: white;

            box-shadow:
                0 0 0 3px rgba(197,160,89,0.15);

        }


        /* =====================================================
           عرض قيمة الاستحقاق
        ===================================================== */

        .amount-preview {

            display: none;

            margin-top: 20px;

            background: #f0f7f4;

            border: 1px dashed var(--primary-color);

            border-radius: 10px;

            padding: 18px;

            text-align: center;

        }


        .amount-preview-title {

            font-size: 14px;

            color: #555;

            margin-bottom: 5px;

        }


        .amount-preview-value {

            font-size: 26px;

            font-weight: 800;

            color: var(--primary-color);

        }


        /* =====================================================
           مجموعة الأزرار
        ===================================================== */

        .btn-group {

            margin-top: 25px;

            display: flex;

            gap: 12px;

        }


        .btn {

            flex: 1;

            border: none;

            border-radius: 9px;

            padding: 14px 20px;

            font-size: 15px;

            font-weight: 700;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            transition: 0.3s;

        }


        .btn-primary {

            background: var(--primary-color);

            color: white;

        }


        .btn-primary:hover {

            background: var(--primary-dark);

            transform: translateY(-2px);

        }


        .btn-print {

            background: var(--gold);

            color: #111;

        }


        .btn-print:hover {

            background: #b18d4c;

            transform: translateY(-2px);

        }


        /* =====================================================
           منطقة الطباعة
        ===================================================== */

        #printableArea {

            display: none;

            background: white;

            width: 100%;

            min-height: 250px;

            padding: 15px;

            border-radius: 12px;

            position: relative;

        }

        .print-box {

            width: 220px;

            max-width: 100%;

            margin: 0 auto;

            padding: 8px 12px;

            border: 1px solid #d8d8d8;

            border-top: 2px solid var(--gold);

            border-radius: 6px;

            background: #fafafa;

            text-align: right;

            font-size: 10px;

            line-height: 1.1;

        }

        .print-row {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 4px;

            padding-bottom: 3px;

            border-bottom: 1px dotted #cccccc;

        }

        .print-row:last-child {

            border-bottom: none;

            margin-bottom: 0;

            padding-bottom: 0;

        }

        .print-label {

            font-weight: 700;

            color: #444;

            font-size: 10px;

        }

        .print-val {

            font-weight: 800;

            color: var(--primary-color);

            font-size: 10px;

        }

        .signature-area {

            margin-top: 6px;

            padding-top: 4px;

            border-top: 1px dotted #cccccc;

        }

        .signature-title {

            font-size: 10px;

            font-weight: 700;

            color: #333;

            margin-bottom: 10px;

        }

        .signature-line {

            width: 85%;

            border-bottom: 1px dotted #666;

            margin: auto;

        }


        /* =====================================================
           زر الطباعة
        ===================================================== */

        #printBtnContainer {

            display: none;

            margin-top: 20px;

            margin-bottom: 30px;

        }


        /* =====================================================
           تنسيق الشاشات العادية والجوال
        ===================================================== */

        @media (max-width: 600px) {

            body {

                padding: 12px;

            }


            .main-header {

                padding: 20px;

                flex-direction: column;

                text-align: center;

                gap: 15px;

            }


            .header-title h1 {

                font-size: 20px;

            }


            .header-title p {

                font-size: 13px;

            }


            .logo-container img {

                height: 70px;

            }


            .card {

                padding: 20px;

            }


            .btn-group {

                flex-direction: column;

            }


            #printableArea {

                padding: 10px;

                min-height: 200px;

            }

            .print-box {

                width: 100%;

            }

        }


        /* =====================================================
           إعدادات الطباعة الخاصة المصلحة للجوال واللابتوب
        ===================================================== */

        @media print {

            @page {

                size: A4 portrait;

                margin: 0 !important;

            }

            html {

                height: 100% !important;

                overflow: hidden !important;

            }

            body {

                background: white !important;

                padding: 0 !important;

                margin: 0 !important;

                width: 100% !important;

                height: 100% !important;

                position: relative !important;

            }

            .no-print {

                display: none !important;

            }

            #printableArea {

                display: block !important;

                width: 100% !important;

                height: 100% !important;

                min-height: 100% !important;

                border: none !important;

                box-shadow: none !important;

                border-radius: 0 !important;

                padding: 0 !important;

                margin: 0 !important;

                position: absolute !important;

                top: 0 !important;

                left: 0 !important;

            }

            /* تم حل مشكلة الجوال باستخدام التثبيت بالتدفق المرن (Flexbox) */
            .print-box {

                position: fixed !important;

                bottom: 15mm !important; /* ثابت في الأسفل للجوال والكمبيوتر */

                left: 50% !important;

                transform: translateX(-50%) !important;

                width: 220px !important;

                padding: 6px 10px !important;

                font-size: 10px !important;

                line-height: 1.1 !important;

                border: 1px solid #bbb !important;

                border-top: 2px solid var(--gold) !important;

                background: #ffffff !important;

                box-sizing: border-box !important;

            }

            .print-row {

                margin-bottom: 4px !important;

                padding-bottom: 3px !important;

                border-bottom: 1px dotted #bbbbbb !important;

            }

            .print-label, .print-val {

                font-size: 10px !important;

            }

            .signature-area {

                margin-top: 5px !important;

                padding-top: 4px !important;

                border-top: 1px dotted #bbbbbb !important;

            }

            .signature-title {

                font-size: 10px !important;

                margin-bottom: 10px !important;

            }

            .signature-line {

                border-bottom: 1px dotted #555 !important;

            }

        }

    </style>

</head>


<body>


<div class="container">


    <!-- =====================================================
         الهيدر
    ====================================================== -->

    <header class="main-header no-print">


        <div class="header-title">


            <h1>

                نظام الاستعلام عن تعويض الأركاب

            </h1>


            <p>

                نظام إلكتروني لحساب استحقاق تعويض الأركاب
معهد سلاح المشاة
            </p>


        </div>


        <div class="logo-container">


            <img

                src="https://upload.wikimedia.org/wikipedia/commons/e/e9/Ministry_of_Defense_Saudi_Arabia_Logo.png"

                alt="شعار وزارة الدفاع"

                onerror="this.style.display='none'"

            >


        </div>


    </header>



    <!-- =====================================================
         بطاقة الاستعلام
    ====================================================== -->

    <div class="card no-print">


        <div class="card-title">


            <i class="fa-solid fa-calculator"></i>


            حساب الاستحقاق


        </div>



        <!-- اختيار الوجهة -->


        <div class="form-group">


            <label for="destination">


                <i class="fa-solid fa-location-dot"></i>


                اختر الوجهة


            </label>



            <select id="destination">


                <option value="">اختر الوجهة...</option>


            </select>


        </div>



        <!-- =================================================
             عرض مبلغ الاستحقاق
        ================================================== -->


        <div

            class="amount-preview"

            id="amountPreview"

        >


            <div class="amount-preview-title">


                قيمة الاستحقاق


            </div>



            <div

                class="amount-preview-value"

                id="previewAmount"

            >


                0 ريال


            </div>


        </div>



        <!-- =================================================
             زر الحساب
        ================================================== -->


        <div class="btn-group">


            <button

                type="button"

                class="btn btn-primary"

                onclick="calculateAllowance()"

            >


                <i class="fa-solid fa-calculator"></i>


                حساب الاستحقاق


            </button>


        </div>


    </div>



    <!-- =====================================================
         منطقة الطباعة (المربع الموحد)
    ====================================================== -->


    <div id="printableArea">


        <div class="print-box">


            <!-- الوجهة -->

            <div class="print-row">

                <span class="print-label">الوجهة:</span>

                <span class="print-val" id="printDestination">--</span>

            </div>


            <!-- مبلغ الاستحقاق -->

            <div class="print-row">

                <span class="print-label">الاستحقاق:</span>

                <span class="print-val" id="printAmount">0 ريال سعودي</span>

            </div>


            <!-- اسم المحاسب -->

            <div class="print-row">

                <span class="print-label">اسم المحاسب:</span>

                <span class="print-val" id="printAccountant">علي</span>

            </div>


            <!-- منطقة التوقيع -->

            <div class="signature-area">

                <div class="signature-title">التوقيع:</div>

                <div class="signature-line"></div>

            </div>


        </div>


    </div>



    <!-- =====================================================
         زر الطباعة
    ====================================================== -->


    <div

        id="printBtnContainer"

        class="no-print"

    >


        <button

            class="btn btn-print"

            onclick="window.print()"

        >


            <i class="fa-solid fa-print"></i>


            طباعة الاستحقاق


        </button>


    </div>


</div>



<script>


// ============================================================
//                 إعدادات النظام
// ============================================================

const accountantName = " ";


const destinations = {

    "أبها - نيوم":3527.08,

    "أبها - الرياض": 1518.53,

    "أبها - جدة": 1275.25,

    "أبها - الدمام": 3016.92,

    "أبها - الأحساء": 3016.92,

    "أبها - تبوك": 3603.58,

    "أبها - المدينة المنورة": 2911.68,

    "أبها - حفر الباطن": 2414.90,

    "أبها - القيصومة": 2414.90,

    "أبها - الباحة": 2813.72,

    "أبها - العلا": 3098.68,

    "أبها - جازان": 2972.88,

    "أبها - طريف": 3112.59,

    "أبها - عرعر": 3114.56,

    "الرياض - نيوم": 2008.55,

    "الرياض - جدة": 1707.65,

    "الرياض - الدمام": 1498.39,

    "نجران - تبوك": 3531.69,

    "أبها - القريات": 3272.08,

    "جازان - نيوم": 3448.45,

    "الطائف - نيوم": 2949.08,

    "أبها - الجوف": 3224.49,

    "جازان - تبوك": 3539.40,

    "الرياض - تبوك": 2085.05

};


// الحصول على قائمة الوجهات

const destinationSelect = document.getElementById("destination");


// إضافة الوجهات إلى القائمة تلقائيًا

Object.keys(destinations).forEach(function(destination) {

    const option = document.createElement("option");

    option.value = destination;

    option.textContent = destination;

    destinationSelect.appendChild(option);

});


// عند تغيير الوجهة

destinationSelect.addEventListener("change", function() {

    const selectedDestination = this.value;

    const amount = destinations[selectedDestination];

    if (selectedDestination && amount !== undefined) {

        document.getElementById("amountPreview").style.display = "block";

        document.getElementById("previewAmount").textContent = formatSaudiNumber(amount) + " ريال سعودي";

    } else {

        document.getElementById("amountPreview").style.display = "none";

    }

});


// تنسيق الأرقام

function formatSaudiNumber(number) {

    return Number(number).toLocaleString("ar-SA", {

        minimumFractionDigits: 0,

        maximumFractionDigits: 2

    });

}


// حساب الاستحقاق

function calculateAllowance() {

    const selectedDestination = document.getElementById("destination").value;

    if (!selectedDestination) {

        alert("الرجاء اختيار الوجهة أولاً.");

        return;

    }

    const amount = destinations[selectedDestination];

    if (amount === undefined || amount === null) {

        alert("لا يوجد مبلغ مسجل لهذه الوجهة.");

        return;

    }

    // تعبئة بيانات الطباعة داخل المربع

    document.getElementById("printDestination").textContent = selectedDestination;

    document.getElementById("printAmount").textContent = formatSaudiNumber(amount) + " ريال";

    document.getElementById("printAccountant").textContent = accountantName;

    // إظهار منطقة الطباعة وزر الطباعة

    document.getElementById("printableArea").style.display = "block";

    document.getElementById("printBtnContainer").style.display = "block";

    // الانتقال إلى منطقة النتيجة

    document.getElementById("printableArea").scrollIntoView({

        behavior: "smooth"

    });

}

</script>


</body>

</html>
